<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Exam Performance Indicator</title>

    <style>

        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#1c2b4a,#0b1220);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
        }

        .container{
            background: rgba(255,255,255,0.1);
            padding:40px;
            border-radius:15px;
            width:420px;
            backdrop-filter: blur(10px);
            box-shadow:0 10px 40px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:10px;
        }

        legend{
            text-align:center;
            margin-bottom:20px;
            font-size:18px;
        }

        label{
            display:block;
            margin-top:10px;
            margin-bottom:5px;
        }

        select,input{
            width:100%;
            padding:10px;
            border-radius:8px;
            border:none;
            margin-bottom:10px;
        }

        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#63b3ed;
            color:#0b1220;
            font-weight:bold;
            font-size:16px;
            cursor:pointer;
        }

        .btn:hover{
            opacity:0.9;
        }

        .result{
            text-align:center;
            margin-top:20px;
            font-size:20px;
            color:#63b3ed;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container">

<h1>Student Exam Performance Indicator</h1>

<form action="{{ url_for('predict_datapoint') }}" method="post">

<label>Gender</label>
<select name="gender" required>
<option selected disabled value="">Select Gender</option>
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<label>Race or Ethnicity</label>
<select name="ethnicity" required>
<option selected disabled value="">Select Ethnicity</option>
<option value="group A">Group A</option>
<option value="group B">Group B</option>
<option value="group C">Group C</option>
<option value="group D">Group D</option>
<option value="group E">Group E</option>
</select>

<label>Parental Level of Education</label>
<select name="parental_level_of_education" required>
<option selected disabled value="">Select Parent Education</option>
<option value="associate's degree">Associate's Degree</option>
<option value="bachelor's degree">Bachelor's Degree</option>
<option value="high school">High School</option>
<option value="master's degree">Master's Degree</option>
<option value="some college">Some College</option>
<option value="some high school">Some High School</option>
</select>

<label>Lunch Type</label>
<select name="lunch" required>
<option selected disabled value="">Select Lunch Type</option>
<option value="free/reduced">Free / Reduced</option>
<option value="standard">Standard</option>
</select>

<label>Test Preparation Course</label>
<select name="test_preparation_course" required>
<option selected disabled value="">Select Course</option>
<option value="none">None</option>
<option value="completed">Completed</option>
</select>

<label>Reading Score (0-100)</label>
<input type="number" name="reading_score" placeholder="Enter Reading Score" min="0" max="100" required>

<label>Writing Score (0-100)</label>
<input type="number" name="writing_score" placeholder="Enter Writing Score" min="0" max="100" required>

<br>

<input class="btn" type="submit" value="Predict Maths Score">

</form>

{% if results %}
<div class="result">
Prediction: {{ results }}
</div>
{% endif %}

</div>

</body>
</html>
